<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Document | Lex Firm</title>
    <link rel="stylesheet" href="../assets/css/admin-button.css">
    <script type="text/javascript" src="https://www.dropbox.com/static/api/2/dropins.js" id="dropboxjs" data-app-key="YOUR_DROPBOX_APP_KEY"></script>
</head>
<body>

<div class="overlay">
    <div class="dashboard-card">
        <h1>Upload Document</h1>
        
        <div style="margin-bottom: 25px;">
            <label style="color: var(--gold); font-size: 0.9rem;">Search Client</label>
            <input type="text" id="clientSearch" placeholder="Type Client Name or ID...">
            <div class="search-results" id="searchResults" style="display:none;">
                <div class="result-item" onclick="selectClient('20001', 'John Doe')">John Doe (ID: 20001)</div>
            </div>
        </div>

        <form action="upload_handler.php" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="client_id" id="selectedClientId">

            <div class="action-grid">
                <div>
                    <label style="color: var(--gold); font-size: 0.9rem;">Select Corresponding Case</label>
                    <select name="case_id" id="caseSelect" required disabled>
                        <option value="">Search for client first...</option>
                    </select>
                </div>
                
                <div>
                    <label style="color: var(--gold); font-size: 0.9rem;">Document Title</label>
                    <input type="text" name="doc_title" placeholder="e.g. Property Deed" required>
                </div>
            </div>

            <div class="upload-zone">
                <p>Drag and drop local file or click below</p>
                <input type="file" name="local_file" id="localFile" style="margin-top: 10px;">
                
                <p style="margin: 15px 0; opacity: 0.5;">— OR —</p>
                
                <button type="button" class="btn-dropbox" id="dropboxChooser">
                    <img src="https://cdns.iconmonstr.com/wp-content/releases/preview/2012/240/iconmonstr-dropbox-1.png" width="18" style="filter: brightness(0) invert(1);">
                    Choose from Dropbox
                </button>
                <input type="hidden" name="dropbox_link" id="dropboxLink">
            </div>

            <textarea name="remarks" placeholder="Add remarks/description..." style="margin-top: 20px; height: 80px;"></textarea>

            <button type="submit" class="btn-submit">Confirm and Upload</button>
        </form>

        <a href="../dashboard/admin_dashboard.html" class="btn-logout">← Back to Dashboard</a>
    </div>
</div>

<script>
    // Logic to simulate client selection and unlocking case dropdown
    function selectClient(id, name) {
        document.getElementById('clientSearch').value = name;
        document.getElementById('selectedClientId').value = id;
        document.getElementById('searchResults').style.display = 'none';
        
        const caseSelect = document.getElementById('caseSelect');
        caseSelect.disabled = false;
        // In a real app, you would fetch these from your 'cases' table using AJAX
        caseSelect.innerHTML = `
            <option value="40001">Case #40001 - Civil Suit</option>
            <option value="40002">Case #40002 - Property Dispute</option>
        `;
    }

    // Dropbox Chooser
    document.getElementById('dropboxChooser').addEventListener('click', function() {
        Dropbox.choose({
            success: function(files) {
                document.getElementById('dropboxLink').value = files[0].link;
                alert("File linked from Dropbox: " + files[0].name);
            },
            linkType: "direct",
            extensions: ['.pdf', '.doc', '.docx', '.jpg', '.png'],
        });
    });

    // Show results when typing (Simplified)
    document.getElementById('clientSearch').addEventListener('focus', () => {
        document.getElementById('searchResults').style.display = 'block';
    });
</script>

</body>
</html>
