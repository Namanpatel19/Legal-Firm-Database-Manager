<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Lex Firm</title>
    <link rel="stylesheet" href="../../assets/css/admin-button.css">
</head>
<body>

<div class="overlay">
    <div class="dashboard-card">
        <h1>New Client Entry</h1>
        <p>Establish a new client profile in the secure database.</p>
        
        <form class="form-container">
            <div class="action-grid">
                <input type="text" placeholder="First Name" required>
                <input type="text" placeholder="Last Name">
                <input type="email" placeholder="Email Address" required>
                <input type="text" placeholder="Phone Number" required>
                <input type="text" placeholder="Permanent Address">
                <input type="password" placeholder="Client Portal Password">
            </div>
            <button type="submit" class="btn-submit" style="margin-top:20px;">Create Client Profile</button>
        </form>
        <a href="../dashboard/admin_dashboard.html" class="btn-logout">← Back to Dashboard</a>
    </div>
</div>

</body>
</html>
