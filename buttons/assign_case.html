<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Lex Firm</title>
    <link rel="stylesheet" href="../assets/css/admin-button.css">
</head>
<body>

<div class="overlay">
    <div class="dashboard-card">
        <h1>Case Assignment</h1>
        <p>Link a specific legal case to a lead advocate.</p>
        
        <form class="form-container">
            <div class="action-grid">
                <select name="case_id" required>
                    <option value="" disabled selected>Select Case Number</option>
                    </select>
                <select name="advocate_id" required>
                    <option value="" disabled selected>Select Advocate</option>
                    </select>
                <input type="text" placeholder="Assignment Role (e.g. Lead Counsel)">
            </div>
            <button type="submit" class="btn-submit" style="margin-top:20px;">Finalize Assignment</button>
        </form>
        <a href="../dashboard/admin_dashboard.html" class="btn-logout">← Back to Dashboard</a>
    </div>
</div>


</body>
</html>
